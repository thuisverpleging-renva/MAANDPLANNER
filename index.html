<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlanAssist</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root{--bg:#f0f4ff;--surface:#ffffff;--surface2:#e8eef8;--border:#d0daea;--border2:#b8c8e0;--text:#1e2d40;--text2:#4a6080;--text3:#8098b8;--blue:#3b82f6;--violet:#7c3aed;--green:#10b981;--red:#ef4444;--amber:#f59e0b;--cyan:#06b6d4}
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(135deg,#e8f0fe 0%,#f0f4ff 40%,#faf0ff 100%);background-attachment:fixed;color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;user-select:none}
.header{position:sticky;top:0;z-index:50;background:rgba(240,244,255,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);box-shadow:0 1px 12px rgba(59,130,246,.08)}
.header-inner{max-width:1100px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--blue),var(--violet));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px}
.logo-text{font-weight:700;font-size:15px}
.logo-sub{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:5px}
.online-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block}
.badge-admin{background:rgba(245,158,11,.15);color:#b45309;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700;margin-left:6px}
.month-nav{display:flex;align-items:center;gap:8px;background:var(--surface2);border-radius:12px;padding:6px 12px}
.month-nav button{background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px;padding:0 4px;line-height:1;transition:color .15s}
.month-nav button:hover{color:var(--text)}
.month-name{font-size:14px;font-weight:600;min-width:140px;text-align:center;text-transform:capitalize}
.tabs-bar{background:rgba(240,244,255,.8);border-bottom:1px solid var(--border)}
.tabs-inner{max-width:1100px;margin:0 auto;padding:0 16px;display:flex;gap:4px;padding-top:8px;overflow-x:auto}
.tab{background:none;border:none;color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;padding:10px 14px;border-radius:8px 8px 0 0;transition:all .15s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{background:var(--bg);color:var(--text);border:1px solid var(--border);border-bottom-color:var(--bg)}
.content{max-width:1100px;margin:0 auto;padding:24px 16px}
.view{display:none}.view.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px}
.space-y>*+*{margin-top:16px}
.space-y-sm>*+*{margin-top:10px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.h2{font-size:20px;font-weight:700}
.subtext{font-size:13px;color:var(--text2);margin-top:3px}
.label{font-size:11px;color:var(--text2);margin-bottom:5px;display:block}
input[type=text],input[type=number],select{background:#f7f9ff;border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;padding:8px 12px;width:100%;outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:var(--blue)}
input[type=color]{background:#f7f9ff;border:1px solid var(--border2);border-radius:8px;height:38px;width:100%;cursor:pointer;padding:2px}
input[type=checkbox]{width:16px;height:16px;accent-color:var(--blue);cursor:pointer}
.btn{border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;padding:8px 16px;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-blue{background:var(--blue);color:white}.btn-blue:hover{background:#2563eb}
.btn-green{background:var(--green);color:white}.btn-green:hover{background:#059669}
.btn-ghost{background:var(--surface2);color:var(--text2)}.btn-ghost:hover{background:var(--border2);color:var(--text)}
.btn-red{background:transparent;color:var(--red)}.btn-red:hover{background:rgba(239,68,68,.15);color:white}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-gradient{background:linear-gradient(135deg,var(--blue),var(--violet));color:white;border-radius:12px;padding:10px 20px;font-size:14px;box-shadow:0 4px 20px rgba(59,130,246,.25)}
.btn-gradient:hover{opacity:.9}.btn-gradient:disabled{opacity:.5;cursor:not-allowed}
.badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.badge-blue{background:rgba(59,130,246,.15);color:#93c5fd}
.badge-purple{background:rgba(139,92,246,.15);color:#c4b5fd}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:white;flex-shrink:0}
.save-status{font-size:11px}
.save-saving{color:#6b7280}.save-saved{color:var(--green)}
.info-box{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.25);border-radius:12px;padding:14px}
.info-box p{font-size:12px;color:#2563eb;line-height:1.6}
.info-box .info-title{font-size:13px;font-weight:700;color:#1d4ed8;margin-bottom:5px}
.link-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.link-url{background:#f7f9ff;border:1px solid var(--border2);border-radius:8px;padding:7px 10px;font-size:11px;font-family:monospace;color:var(--cyan);word-break:break-all;flex:1;min-width:0}
.col-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px}
.edit-form{display:flex;flex-direction:column;gap:12px}
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:14px}
table{width:100%;border-collapse:collapse;font-size:11px}
thead tr{background:var(--surface2)}
th{padding:8px 4px;text-align:center;border-right:1px solid rgba(30,45,64,.6);color:var(--text2);font-weight:600;min-width:34px}
th.col-header{position:sticky;left:0;background:var(--surface2);text-align:left;padding:8px 12px;min-width:130px;border-right:1px solid var(--border)}
th.sat{color:#fb923c;background:rgba(124,45,18,.1)}
th.sun{color:#f87171;background:rgba(127,29,29,.12)}
td{padding:3px 2px;text-align:center;border-right:1px solid rgba(30,45,64,.4);border-bottom:1px solid rgba(30,45,64,.4)}
td.row-header{position:sticky;left:0;background:#f7f9ff;padding:5px 10px;border-right:1px solid var(--border);text-align:left}
tr:nth-child(even) td{background:rgba(220,230,248,.3)}
tr:nth-child(even) td.row-header{background:#f7f9ff}
.shift-cell{display:inline-flex;align-items:center;justify-content:center;width:26px;height:22px;border-radius:5px;font-weight:700;font-size:11px}
.conflict-bg td:not(.row-header){background:rgba(127,29,29,.12)!important}
.totals-row td{background:var(--surface2)!important;font-size:10px;padding:4px 2px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px}
.warn-box{background:rgba(254,243,199,.8);border:1px solid rgba(245,158,11,.4);border-radius:12px;padding:14px}
.warn-box .warn-title{color:#b45309;font-size:13px;font-weight:700;margin-bottom:6px}
.warn-box p{font-size:11px;color:#92400e;line-height:1.6}
.day-config-grid{display:flex;flex-wrap:wrap;gap:8px}
.day-cfg{display:flex;flex-direction:column;align-items:center;gap:3px}
.day-cfg span{font-size:10px;color:var(--text3)}
.day-cfg .dnum{font-size:11px;font-weight:700;color:var(--text2)}
.day-cfg select{width:38px;font-size:11px;padding:3px 2px;text-align:center}

/* Calendar for collega view */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day-label{text-align:center;font-size:11px;color:var(--text3);font-weight:600;padding:4px 0}
.cal-cell{background:#ffffff;border:2px solid var(--border);border-radius:10px;text-align:center;padding:5px 2px;cursor:pointer;transition:border-color .12s,background .12s;position:relative;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.cal-cell.sun{background:rgba(254,226,226,.5);border-color:rgba(252,165,165,.6)}
.cal-cell.dragging{border-color:var(--blue)!important;background:rgba(59,130,246,.1)!important}
.cal-cell.selected-drag{border-color:var(--violet)!important}
.cal-cell .day-num{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:3px;pointer-events:none}
.cal-cell .wish-val{font-size:13px;font-weight:800;pointer-events:none;min-height:18px;line-height:1.2}
.cal-cell:hover{border-color:var(--border2)}
.cal-cell.blocked-cell{opacity:.5;cursor:not-allowed}

/* Quick select bar */
.quick-bar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;background:var(--surface2);border-radius:10px;padding:10px 12px;margin-bottom:10px}
.quick-btn{border:2px solid transparent;border-radius:8px;cursor:pointer;font-size:13px;font-weight:800;padding:6px 14px;transition:all .12s;background:transparent}
.quick-btn.active{transform:scale(1.05)}
.quick-hint{font-size:11px;color:var(--text3);margin-left:auto}

/* Collega view */
.collega-view{max-width:620px;margin:0 auto;padding:20px 14px}
.collega-header{text-align:center;padding:28px 16px 20px;background:linear-gradient(135deg,rgba(59,130,246,.12),rgba(124,58,237,.12));border-radius:20px;margin-bottom:20px;border:1px solid rgba(59,130,246,.15)}
.big-avatar{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;color:white;margin:0 auto 10px}
.submit-btn{width:100%;padding:14px;font-size:16px;border-radius:14px;background:linear-gradient(135deg,var(--blue),var(--violet));border:none;color:white;font-weight:700;cursor:pointer;margin-top:10px;transition:opacity .15s}
.submit-btn:hover{opacity:.9}.submit-btn:disabled{opacity:.5;cursor:not-allowed}
.success-screen{text-align:center;padding:48px 24px}
.success-icon{font-size:56px;margin-bottom:16px}

/* Section title */
.section-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}

/* Blocked days grid in team edit */
.blocked-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.blocked-day-btn{border:1px solid var(--border2);border-radius:8px;background:transparent;color:var(--text2);font-size:12px;font-weight:600;padding:6px 4px;cursor:pointer;text-align:center;transition:all .15s}
.blocked-day-btn.blocked{background:rgba(239,68,68,.15);border-color:var(--red);color:var(--red)}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:12px}
.spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){.grid-2,.grid-3{grid-template-columns:1fr}.month-name{min-width:90px;font-size:12px}.tab{padding:8px 10px;font-size:12px}}
@media print {
  body * { visibility: hidden; }
  #pdf-print-area, #pdf-print-area * { visibility: visible; }
  #pdf-print-area { position: absolute; left: 0; top: 0; width: 100%; }
  @page { margin: 1.5cm; size: A4 landscape; }
}
.pdf-btn { background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; border-radius: 10px; padding: 10px 20px; font-size: 14px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
.pdf-btn:hover { opacity: .9; }
/* styles moved to pdf-table section */
.pdf-logo-box { display: flex; align-items: center; gap: 12px; }
.pdf-logo-icon { width: 48px; height: 48px; border-radius: 10px; background: linear-gradient(135deg, #3b82f6, #7c3aed); display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; font-size: 20px; }
.pdf-org-name { font-size: 20px; font-weight: 800; color: #1e2d40; }
.pdf-org-sub { font-size: 12px; color: #4a6080; }
.pdf-month-title { font-size: 16px; font-weight: 700; color: #3b82f6; text-transform: capitalize; }
.pdf-table { width: 100%; border-collapse: collapse; font-size: 11px; border-radius: 8px; overflow: hidden; }
.pdf-table th { background: #2d2d2d; color: white; padding: 8px 10px; text-align: center; font-weight: 700; font-size: 11px; letter-spacing: .03em; }
.pdf-table th:first-child { text-align: left; }
.pdf-table th:nth-child(2) { text-align: center; width: 32px; }
.pdf-table th.morning-col { background: #1a3a6b; }
.pdf-table th.evening-col { background: #4a1a7a; }
.pdf-table td { padding: 6px 10px; border-bottom: 1px solid #e8eef8; border-right: 1px solid #e8eef8; vertical-align: middle; font-size: 11px; }
.pdf-table tr:last-child td { border-bottom: none; }
.pdf-table tr:nth-child(even) td { background: #f8faff; }
.pdf-table tr:nth-child(even) td.evening-cell { background: #f0ebff; }
.pdf-table tr:nth-child(even) td.evening-empty { background: #f0ebff; }
.pdf-table tr.weekend-row td { background: #fff4f0 !important; }
.pdf-table tr.weekend-row td.evening-cell { background: #f5e6ff !important; }
.pdf-table tr.weekend-row td.evening-empty { background: #f5e6ff !important; }
.pdf-table tr.weekend-row td.day-cell { font-weight: 700; color: #c0392b; }
.pdf-table tr.weekend-row td.date-cell { color: #c0392b; font-weight: 800; }
.pdf-table td.day-cell { font-weight: 600; text-transform: capitalize; color: #1e2d40; white-space: nowrap; }
.pdf-table td.date-cell { font-weight: 800; color: #1a3a6b; text-align: center; width: 28px; }
.pdf-table td.name-cell { font-weight: 700; color: #1e2d40; text-align: center; }
.pdf-table td.empty-cell { color: #dde6f0; text-align: center; }
.pdf-table td.evening-cell { background: #f0ebff; color: #4a1a7a; font-weight: 700; text-align: center; }
.pdf-table td.evening-empty { background: #f0ebff; color: #d8c8f5; text-align: center; }
.pdf-footer { margin-top: 14px; font-size: 10px; color: #94a3b8; text-align: right; border-top: 1px solid #e8eef8; padding-top: 8px; }
#pdf-print-area { font-family: Arial, sans-serif; background: white; color: #1e2d40; padding: 0; }
.pdf-logo-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 3px solid #c0392b; }

</style>
</head>
<body>
<div class="loading" id="loading"><div class="spinner"></div><p style="color:var(--text2);font-size:13px">Laden...</p></div>
<div id="app" style="display:none"></div>

<script>
// ─── Firebase ─────────────────────────────────────────────────────────────────
firebase.initializeApp({apiKey:"AIzaSyCC_2Alj50fouNaYkxh9QXlYKJhPuc5Tqk",authDomain:"werkplanner-renva.firebaseapp.com",projectId:"werkplanner-renva",storageBucket:"werkplanner-renva.firebasestorage.app",messagingSenderId:"843096875195",appId:"1:843096875195:web:127124c2f04bf9522a899e"});
const db=firebase.firestore();
async function fbGet(k){try{const d=await db.collection("planning").doc(k).get();return d.exists?d.data().value:null}catch{return null}}
async function fbSet(k,v){try{await db.collection("planning").doc(k).set({value:v})}catch(e){console.error(e)}}

// ─── Constants ────────────────────────────────────────────────────────────────
const DAYS_NL=["Ma","Di","Wo","Do","Vr","Za","Zo"];
const DAYS_FULL=["Maandag","Dinsdag","Woensdag","Donderdag","Vrijdag","Zaterdag","Zondag"];
const SHIFTS={O:{label:"Ochtend",color:"#3b82f6"},A:{label:"Avond",color:"#8b5cf6"},V:{label:"Vrij",color:"#ef4444",display:"✕"},"?":{label:"Open",color:"#d97706"}};

// ─── URL mode ─────────────────────────────────────────────────────────────────
const params=new URLSearchParams(window.location.search);
const MODE=params.get("collega")?"collega":"admin";
const COLLEGA_ID=MODE==="collega"?parseInt(params.get("collega")):null;

// ─── State ────────────────────────────────────────────────────────────────────
// col.blockedShifts = { "1": ["A"], "3": ["O","A"] }  (dow 0=Sun..6=Sat -> we use 0=Mon..6=Sun mapping)
// col.maxShiftsMonth = 20  (max working days per month)
let S={
  year:new Date().getFullYear(),month:5,tab:"team",
  colleagues:[
    {id:1,name:"Lisa Martens",type:"fulltime",color:"#0ea5e9",maxConsec:7,maxMonth:22,blockedShifts:{}},
    {id:2,name:"Tom Devries",type:"fulltime",color:"#10b981",maxConsec:7,maxMonth:22,blockedShifts:{}},
    {id:3,name:"Sara Peeters",type:"fulltime",color:"#f59e0b",maxConsec:7,maxMonth:22,blockedShifts:{}},
    {id:4,name:"Bram Jacobs",type:"fulltime",color:"#ef4444",maxConsec:7,maxMonth:22,blockedShifts:{}},
    {id:5,name:"Nora Claes",type:"hospital",color:"#8b5cf6",maxConsec:7,maxMonth:15,blockedShifts:{}},
    {id:6,name:"Kevin Smits",type:"hospital",color:"#ec4899",maxConsec:7,maxMonth:15,blockedShifts:{}},
  ],
  wishes:{},dayConfigs:{},weekdayDefaults:{O:[4,4,4,4,4,3,3],A:[1,1,1,1,1,1,1]},editingId:null,schedule:null,generating:false,
  saveStatus:null,planError:null,submitted:false,
  // drag state for calendar
  dragActive:false,dragValue:"V",
};
let saveTimer=null;

// ─── Helpers ─────────────────────────────────────────────────────────────────
function showSave(s){S.saveStatus=s;renderSaveStatus();clearTimeout(saveTimer);if(s==="saved")saveTimer=setTimeout(()=>{S.saveStatus=null;renderSaveStatus()},2500)}
function renderSaveStatus(){const els=document.querySelectorAll(".save-slot");els.forEach(el=>{el.innerHTML=S.saveStatus==="saving"?`<span class="save-status save-saving">↻ Opslaan...</span>`:S.saveStatus==="saved"?`<span class="save-status save-saved">✓ Opgeslagen</span>`:""})}
function getDays(y,m){const days=[],d=new Date(y,m,1);while(d.getMonth()===m){days.push(new Date(d));d.setDate(d.getDate()+1)}return days}
function defaultMorning(d){const idx=(d.getDay()+6)%7;return S.weekdayDefaults.O[idx]??4}
function defaultEvening(d){const idx=(d.getDay()+6)%7;return S.weekdayDefaults.A[idx]??1}
function getSlots(d){const cfg=S.dayConfigs[d.getDate()];return{morning:cfg?.morning??defaultMorning(d),evening:cfg?.evening??defaultEvening(d)}}
function mName(y,m){return new Date(y,m,1).toLocaleDateString("nl-NL",{month:"long",year:"numeric"})}
function av(col,size=32){const ini=col.name.split(" ").map(n=>n[0]).join("").slice(0,2);return`<div class="avatar" style="width:${size}px;height:${size}px;background:${col.color};font-size:${Math.max(9,size*.35)}px">${ini}</div>`}
function shiftBadge(s){const sh=SHIFTS[s]||SHIFTS["?"];const lbl=sh.display||s;return`<span class="shift-cell" style="background:${sh.color}22;color:${sh.color}">${lbl}</span>`}
function getBaseUrl(){return window.location.href.split("?")[0]}
// dow: 0=Sun,1=Mon..6=Sat  -> we store as 0=Mon..6=Sun
function jsDownToIdx(dow){return(dow+6)%7}

async function saveColleagues(){showSave("saving");await fbSet("colleagues",JSON.stringify(S.colleagues));await fbSet("weekdayDefaults",JSON.stringify(S.weekdayDefaults));showSave("saved")}
async function saveWishes(){showSave("saving");await fbSet(`wishes-${S.year}-${S.month}`,JSON.stringify(S.wishes));showSave("saved")}

// ─── Router ───────────────────────────────────────────────────────────────────
function render(){document.getElementById("app").style.display="block";if(MODE==="collega")renderCollegaView();else renderAdminView()}

// ═══════════════════════════════════════════════════════════════════════════════
// COLLEGA VIEW
// ═══════════════════════════════════════════════════════════════════════════════
let dragVal=null;

function renderCollegaView(){
  const app=document.getElementById("app");
  const col=S.colleagues.find(c=>c.id===COLLEGA_ID);
  if(!col){app.innerHTML=`<div style="text-align:center;padding:60px 20px"><p style="color:var(--text2)">Collega niet gevonden. Vraag een nieuwe link aan de planner.</p></div>`;return}
  if(S.submitted){
    app.innerHTML=`<div class="collega-view"><div class="success-screen">
      <div class="success-icon">✅</div>
      <h2 style="font-size:22px;font-weight:800;margin-bottom:8px">Verstuurd!</h2>
      <p style="color:var(--text2);font-size:14px">Je wensen voor <strong>${mName(S.year,S.month)}</strong> zijn opgeslagen.</p>
      <button class="btn btn-ghost" style="margin-top:24px" onclick="S.submitted=false;render()">Aanpassen</button>
    </div></div>`;
    return;
  }

  const days=getDays(S.year,S.month);
  const dayLabels=DAYS_NL.map(d=>`<div class="cal-day-label">${d}</div>`).join("");
  const empties=Array.from({length:(days[0].getDay()+6)%7},()=>`<div></div>`).join("");

  const cells=days.map(d=>{
    const dow=d.getDay();
    const idx=jsDownToIdx(dow);
    const blocked=(col.blockedShifts||{})[idx]||[];
    const key=`${col.id}-${d.getDate()}`;

    return`<div class="cal-cell ${isSun?"sun":""}"

      const sh=v==="–"?{color:"#475569"}:SHIFTS[v];
      const active=dragVal===(v==="–"?"":v);
      const lbl=v==="V"?"✕":v;
      return`<button class="quick-btn ${active?"active":""}"
        style="color:${sh.color};border-color:${active?sh.color:"transparent"};background:${active?sh.color+"20":"transparent"}"
        onclick="setDragVal('${v==="–"?"":v}')">${lbl}</button>`;
    }).join("")}
    <span class="quick-hint">Selecteer een waarde, klik dan op dag(en)</span>
  </div>`;

  app.innerHTML=`<div class="collega-view">
    <div class="collega-header">
      <div class="big-avatar" style="background:${col.color}">${col.name.split(" ").map(n=>n[0]).join("").slice(0,2)}</div>

        ${(col.blockedShifts&&Object.keys(col.blockedShifts).length)?`<span style="color:var(--red)">✗ = geblokkeerd door planner</span>`:""}
      </div>
    </div>
    <button class="submit-btn" onclick="submitWishes()">✓ Wensen versturen naar planner</button>

  // prevent text selection during drag
  document.addEventListener("mouseup",endDrag);

function setDragVal(v){dragVal=v;if(MODE==="collega")renderCollegaView()}
function openNoteForSelected(){
  // prompt user to click a day
  alert("Klik daarna op een dag in de kalender om een notitie toe te voegen.");
}
function startDrag(e,day,colId){
  e.preventDefault();
  S.dragActive=true;
  applyDrag(day,colId);
}
function continueDrag(e,day,colId){
  if(!S.dragActive)return;
  applyDrag(day,colId);
}
function handleTouchMove(e){
  const touch=e.touches[0];
  const el=document.elementFromPoint(touch.clientX,touch.clientY);
  if(!el)return;
  const cell=el.closest(".cal-cell");
  if(!cell)return;
  const day=parseInt(cell.dataset.day);
  const colId=parseInt(cell.dataset.colid);
  if(day&&colId)applyDrag(day,colId);
}
function endDrag(){S.dragActive=false}

function applyDrag(day,colId){
  if(dragVal===null)return;
  const col=S.colleagues.find(c=>c.id===colId);
  if(!col)return;
  // check blocked
  const d=new Date(S.year,S.month,day);
  const idx=jsDownToIdx(d.getDay());
  const blocked=(col.blockedShifts||{})[idx]||[];
  if(dragVal&&blocked.includes(dragVal))return; // can't set blocked shift
  const key=`${colId}-${day}`;
  S.wishes={...S.wishes,[key]:dragVal};
  // update cell visually without full re-render
  const cell=document.querySelector(`.cal-cell[data-day="${day}"][data-colid="${colId}"]`);
  if(cell){
    const sh=SHIFTS[dragVal];
    const color=sh?sh.color:"#475569";
    const wv=cell.querySelector(".wish-val");
    if(wv){wv.style.color=color;wv.textContent=dragVal==="V"?"✕":dragVal||"–"}
  }
}


function openNote(colId, day, el) {
  // Remove existing modal if any
  const existing = document.getElementById("note-modal");
  if (existing) { existing.remove(); return; }
  
  const noteKey = `${colId}-note-${day}`;
  const currentNote = S.wishes[noteKey] || "";
  
  const modal = document.createElement("div");
  modal.id = "note-modal";
  modal.style.cssText = "position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;border:2px solid #3b82f6;border-radius:14px;padding:18px;z-index:1000;width:min(320px,90vw);box-shadow:0 8px 32px rgba(0,0,0,.15)";
  
  const dayNames = ["zondag","maandag","dinsdag","woensdag","donderdag","vrijdag","zaterdag"];
  const d = new Date(S.year, S.month, day);
  
  modal.innerHTML = `
    <div style="font-weight:700;font-size:14px;color:#1e2d40;margin-bottom:4px">📝 Notitie — ${dayNames[d.getDay()]} ${day}</div>
    <div style="font-size:12px;color:#4a6080;margin-bottom:10px">Voeg een opmerking toe voor deze dag</div>
    <textarea id="note-input" style="width:100%;min-height:80px;background:#f7f9ff;border:1.5px solid #d0daea;border-radius:8px;padding:8px;font-size:13px;color:#1e2d40;resize:vertical;outline:none;font-family:inherit"
      placeholder="Bv. moet om 12u stoppen, kinderen ophalen...">${currentNote}</textarea>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button onclick="saveNote(${colId},${day})" style="flex:1;background:#3b82f6;color:white;border:none;border-radius:8px;padding:8px;font-weight:700;font-size:13px;cursor:pointer">Opslaan</button>
      <button onclick="clearNote(${colId},${day})" style="background:#fee2e2;color:#dc2626;border:none;border-radius:8px;padding:8px;font-weight:600;font-size:13px;cursor:pointer">Wis</button>
      <button onclick="document.getElementById('note-modal').remove()" style="background:#f0f4ff;color:#4a6080;border:none;border-radius:8px;padding:8px;font-weight:600;font-size:13px;cursor:pointer">Sluiten</button>
    </div>`;
  
  const overlay = document.createElement("div");
  overlay.id = "note-overlay";
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:999";
  overlay.onclick = () => { modal.remove(); overlay.remove(); };
  
  document.body.appendChild(overlay);
  document.body.appendChild(modal);
  document.getElementById("note-input").focus();
}

function saveNote(colId, day) {
  const val = document.getElementById("note-input").value.trim();
  const noteKey = `${colId}-note-${day}`;
  S.wishes = {...S.wishes, [noteKey]: val};
  document.getElementById("note-modal").remove();
  document.getElementById("note-overlay").remove();
  renderCollegaView();
}

function clearNote(colId, day) {
  const noteKey = `${colId}-note-${day}`;
  S.wishes = {...S.wishes, [noteKey]: ""};
  document.getElementById("note-modal").remove();
  document.getElementById("note-overlay").remove();
  renderCollegaView();
}
async function submitWishes(){
  const btn=document.querySelector(".submit-btn");
  if(btn){btn.disabled=true;btn.textContent="Versturen..."}
  await fbSet(`wishes-${S.year}-${S.month}`,JSON.stringify(S.wishes));
  S.submitted=true;render();
}
async function prevMonthCollega(){let m=S.month-1,y=S.year;if(m<0){m=11;y--}S.month=m;S.year=y;const sw=await fbGet(`wishes-${S.year}-${S.month}`);S.wishes=sw?JSON.parse(sw):{};S.submitted=false;render()}
async function nextMonthCollega(){let m=S.month+1,y=S.year;if(m>11){m=0;y++}S.month=m;S.year=y;const sw=await fbGet(`wishes-${S.year}-${S.month}`);S.wishes=sw?JSON.parse(sw):{};S.submitted=false;render()}

function toggleBlocked(colId,dayIdx,shift,checked){
  S.colleagues=S.colleagues.map(c=>{
    if(c.id!==colId)return c;
    const bs={...(c.blockedShifts||{})};
    const curr=bs[dayIdx]||[];
    if(checked){if(!curr.includes(shift))bs[dayIdx]=[...curr,shift]}
    else{bs[dayIdx]=curr.filter(s=>s!==shift);if(!bs[dayIdx].length)delete bs[dayIdx]}
    return{...c,blockedShifts:bs};
  });
}
function startEdit(id){S.editingId=id;renderActiveTab()}
function cancelEdit(){S.editingId=null;renderActiveTab()}
function editField(f,v){S.colleagues=S.colleagues.map(c=>c.id===S.editingId?{...c,[f]:v}:c)}

    const slots=getSlots(d);
    const isSat=dow===6,isSun=dow===0;
    return`<div class="day-cfg" style="background:${isSun?"rgba(254,226,226,.4)":isSat?"rgba(255,237,213,.4)":"white"};border:1px solid var(--border);border-radius:8px;padding:5px 4px">
      <span style="font-size:9px;color:var(--text3)">${DAYS_NL[(dow+6)%7]}</span>
      <span class="dnum">${d.getDate()}</span>
      <select title="Ochtend" onchange="setDayConfig(${d.getDate()},'morning',+this.value)">
        ${[2,3,4,5].map(n=>`<option value="${n}" ${slots.morning===n?"selected":""}>${n}O</option>`).join("")}
      </select>
      <select title="Avond" onchange="setDayConfig(${d.getDate()},'evening',+this.value)">
        ${[1,2].map(n=>`<option value="${n}" ${slots.evening===n?"selected":""}>${n}A</option>`).join("")}
      </select>
    </div>`;
  }).join("");
  let schedHtml="";
  if(S.schedule){
    const sc=S.schedule;
    const warn=(sc.warnings||[]).length>0?`<div class="warn-box"><div class="warn-title">⚠ Aandachtspunten</div>${sc.warnings.map(w=>`<p>${w}</p>`).join("")}</div>`:"";
    const stats=`<div class="stats-grid">${Object.entries(sc.stats||{}).map(([name,st])=>{const col=S.colleagues.find(c=>c.name===name);return`<div class="stat-card"><div style="display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;margin-bottom:6px">${col?av(col,22):""}<span>${name.split(" ")[0]}</span></div><div style="display:flex;gap:8px;font-size:11px">${["O","A","V"].map(s=>`<span style="color:${SHIFTS[s].color}"><strong>${st[s]||0}</strong><span style="opacity:.6"> ${s==="V"?"✕":s}</span></span>`).join("")}</div></div>`}).join("")}</div>`;
    const thead=`<tr><th class="col-header">Collega</th>${days.map(d=>{const dow=d.getDay();return`<th class="${dow===0?"sun":dow===6?"sat":""}"><div>${DAYS_NL[(dow+6)%7]}</div><div style="font-weight:800;color:var(--text)">${d.getDate()}</div></th>`}).join("")}</tr>`;
    const tbody=S.colleagues.map(col=>{const cells=days.map(d=>{const ds=sc.schedule?.[d.getDate()]||sc.schedule?.[String(d.getDate())]||sc.schedule?.[""+d.getDate()]||{};const shift=ds[col.name]||"?";const wish=S.wishes[`${col.id}-${d.getDate()}`];const conflict=wish&&wish!==""&&wish!==shift&&shift!=="?";return`<td class="${conflict?"conflict-bg":""}" onclick="editCell(${d.getDate()},'${col.name.replace(/'/g,"\\'")}','${shift}')">${shiftBadge(shift)}${conflict?`<span style="color:var(--red);font-size:9px">!</span>`:""}</td>`}).join("");return`<tr><td class="row-header">${av(col,22)}<span style="font-size:12px;font-weight:600;margin-left:6px">${col.name.split(" ")[0]}</span></td>${cells}</tr>`}).join("");
    const totals=`<tr class="totals-row"><td class="row-header" style="font-size:11px;color:var(--text2);font-weight:600">Rondes</td>${days.map(d=>{const ds=sc.schedule?.[d.getDate()]||sc.schedule?.[String(d.getDate())]||sc.schedule?.[""+d.getDate()]||{};const sl=getSlots(d);const o=Object.values(ds).filter(s=>s==="O").length;const a=Object.values(ds).filter(s=>s==="A").length;const oOk=o===sl.morning,aOk=a===sl.evening;return`<td><div style="color:${oOk?SHIFTS.O.color:"var(--red)"};font-weight:${oOk?"normal":"800"};">${o}/${sl.morning}O</div><div style="color:${aOk?SHIFTS.A.color:"var(--red)"};font-weight:${aOk?"normal":"800"};">${a}/${sl.evening}A</div></td>`}).join("")}</tr>`;
    
    // Build PDF table
    // Find max morning/evening slots across all days
    const maxM = Math.max(...days.map(d=>getSlots(d).morning));
    const maxE = Math.max(...days.map(d=>getSlots(d).evening));
    
    // Table header
    const mHeaders = Array.from({length:maxM},(_,i)=>`<th class="morning-col">Morgen ${i+1}</th>`).join("");
    const eHeaders = Array.from({length:maxE},(_,i)=>`<th class="evening-col">Avond ${i+1}</th>`).join("");
    
    // Table rows
    const tableRows = days.map(d=>{
      const dayNum = d.getDate();
      const dow = d.getDay();
      const dowIdx = (dow+6)%7;
      const isWeekend = dow===0||dow===6;
      const ds = sc.schedule?.[dayNum] || sc.schedule?.[String(dayNum)] || {};
      const sl = getSlots(d);
      
      const morningWorkers = Object.entries(ds).filter(([n,s])=>s==="O").map(([n])=>n.split(" ")[0].toUpperCase());
      const eveningWorkers = Object.entries(ds).filter(([n,s])=>s==="A").map(([n])=>n.split(" ")[0].toUpperCase());
      
      const mCells = Array.from({length:maxM},(_,i)=>{
        const w = morningWorkers[i];
        return w ? `<td class="name-cell">${w}</td>` : `<td class="empty-cell">—</td>`;
      }).join("");
      
      const eCells = Array.from({length:maxE},(_,i)=>{
        const w = eveningWorkers[i];
        return w ? `<td class="evening-cell">${w}</td>` : `<td class="evening-empty">—</td>`;
      }).join("");
      
      const DAYS_FULL_NL=["zondag","maandag","dinsdag","woensdag","donderdag","vrijdag","zaterdag"];
      return `<tr class="${isWeekend?"weekend-row":""}">
        <td class="day-cell">${DAYS_FULL_NL[dow]}</td>
        <td class="date-cell">${dayNum}</td>
        ${mCells}${eCells}
      </tr>`;
    }).join("");
    
    const pdfTableHtml = `<table class="pdf-table">
      <thead><tr>
        <th>Dag</th><th>Dat</th>${mHeaders}${eHeaders}
      </tr></thead>
      <tbody>${tableRows}</tbody>
    </table>`;

    schedHtml=`${warn}
    <!-- Overzicht tabel -->
    <div style="font-weight:700;font-size:14px;margin-bottom:8px">Overzicht per collega</div>
    ${stats}
    <div class="table-wrap"><table><thead>${thead}</thead><tbody>${tbody}${totals}</tbody></table></div>

function setDayConfig(day,type,val){
  if(!S.dayConfigs[day])S.dayConfigs[day]={};
  S.dayConfigs[day][type]=val;
  renderActiveTab();
}
function setWeekdayDefault(idx,type,val){
  S.weekdayDefaults[type][idx]=val;
  renderActiveTab();
}
function editCell(day,name,cur){const s=prompt(`Dienst voor ${name} op dag ${day}. Voer in: O, A of V`,cur);if(!s)return;const v=s.trim().toUpperCase();if(!["O","A","V","?"].includes(v)){alert("Gebruik O, A of V");return}if(!S.schedule.schedule[day])S.schedule.schedule[day]={};S.schedule.schedule[String(day)]=S.schedule.schedule[String(day)]||{};S.schedule.schedule[day][name]=v;S.schedule.schedule[String(day)][name]=v;renderActiveTab()}

async function generatePlanning(){
  S.generating=true;S.planError=null;renderActiveTab();
  const days=getDays(S.year,S.month);
  const ws={};
  S.colleagues.forEach(col=>{
    const blocked={};
    Object.entries(col.blockedShifts||{}).forEach(([idx,shifts])=>{blocked[DAYS_FULL[idx]]=shifts});
    ws[col.name]={type:col.type,maxConsecMorning:col.maxConsec,maxShiftsPerMonth:col.maxMonth||22,blockedShifts:blocked,wishes:{}};
    days.forEach(d=>{const w=S.wishes[`${col.id}-${d.getDate()}`];if(w)ws[col.name].wishes[d.getDate()]=w});
  });
  const cfg=days.map(d=>{const sl=getSlots(d);return{day:d.getDate(),dow:DAYS_NL[(d.getDay()+6)%7],morningSlots:sl.morning,eveningSlots:sl.evening}});
  const prompt=`Je bent een planning-assistent voor een medisch/zorg team.
Maak een maandplanning voor ${mName(S.year,S.month)}.

TEAM:
${JSON.stringify(ws,null,2)}

DAG-CONFIGURATIE:
${JSON.stringify(cfg,null,2)}

WENSEN: O=ochtend, A=avond, V=vrij, leeg=geen voorkeur

REGELS:
1. Fulltime collega's hebben absolute prioriteit
2. Bijbaners worden ingepland als het past
3. Respecteer maxConsecMorning (max ochtenden op rij)
4. Respecteer maxShiftsPerMonth (max werkdagen per maand)
5. Respecteer blockedShifts: als een dag geblokkeerd is voor een dienst, plan die persoon NOOIT die dienst op die weekdag
6. V-wens = vrij tenzij absoluut onmogelijk
7. Verdeel avonddiensten eerlijk
8. Leeg = kies O of A naargelang de nood van die dag
9. Eindresultaat altijd O, A of V per persoon per dag
10. Elke dag: precies morningSlots personen O, precies eveningSlots persoon/personen A

Geef ALLEEN JSON, geen uitleg:
{"schedule":{"1":{"Naam":"O"},...},"stats":{"Naam":{"O":12,"A":4,"V":14},...},"warnings":[]}`;

  try{
    const res=await fetch("https://planning-proxy.renva-planning.workers.dev",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:4000,messages:[{role:"user",content:prompt}]})});
    const data=await res.json();
    const text=data.content?.map(i=>i.text||"").join("")||"";
    const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
    // Normalize schedule keys to both string and number
    if(parsed.schedule){
      const norm={};
      Object.entries(parsed.schedule).forEach(([k,v])=>{norm[k]=v;norm[parseInt(k)]=v;});
      parsed.schedule=norm;
    }
    S.schedule=parsed;
  }catch{S.planError="Kon planning niet genereren. Probeer opnieuw."}
  S.generating=false;renderActiveTab();
}

async function prevMonth(){let m=S.month-1,y=S.year;if(m<0){m=11;y--}S.month=m;S.year=y;const sw=await fbGet(`wishes-${S.year}-${S.month}`);S.wishes=sw?JSON.parse(sw):{};render()}
async function nextMonth(){let m=S.month+1,y=S.year;if(m>11){m=0;y++}S.month=m;S.year=y;const sw=await fbGet(`wishes-${S.year}-${S.month}`);S.wishes=sw?JSON.parse(sw):{};render()}

// ─── Boot ─────────────────────────────────────────────────────────────────────
async function boot(){
  const sc=await fbGet("colleagues");
  if(sc){const parsed=JSON.parse(sc);S.colleagues=parsed.map(c=>({maxMonth:22,blockedShifts:{},...c}))}
  const wd=await fbGet("weekdayDefaults");
  if(wd)S.weekdayDefaults=JSON.parse(wd);
  const sw=await fbGet(`wishes-${S.year}-${S.month}`);
  if(sw)S.wishes=JSON.parse(sw);
  document.getElementById("loading").style.display="none";
  render();
}
boot();
</script>
